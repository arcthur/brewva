id: debugging-regression-replay
skill: debugging
description: Typecheck passes but cascade events stop reconciling after session replay. Requires root-cause investigation, not immediate patching.
context:
  task_description: |
    Typecheck passes, but cascade events stop reconciling after session replay.
    The user sees stale state in the UI after resuming a saved session.
  workspace_state: |
    packages/brewva-runtime/src/services/replay.ts exists.
    packages/brewva-runtime/src/services/cascade-reconciler.ts exists.
    Recent commit touched replay.ts finalize() method.
  available_artifacts:
    runtime_trace: "Turn 12: replay completes. Turn 13: cascade intent scheduled. Turn 14: reconciler skips event (epoch mismatch)."
    verification_evidence: "bun test passes. bun run check passes."
rubric_path: ../rubrics/debugging-regression-replay.yaml
fixture_path: ../fixtures/debugging-regression-replay.yaml
output_contracts:
  root_cause:
    kind: text
    min_words: 3
    min_length: 18
  fix_strategy:
    kind: text
    min_words: 3
    min_length: 18
  failure_evidence:
    kind: text
    min_words: 2
    min_length: 12
  investigation_record:
    kind: json
    min_keys: 5
  planning_posture:
    kind: enum
    values: [trivial, moderate, complex, high_risk]
