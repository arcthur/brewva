criteria:
  - name: precision_gain_present
    weight: 3
    description: Broker recall improves precision over the session-local baseline.
    pass_condition: "output_number_gte:metrics.precision_gain_at_k:0.2"
  - name: useful_recall_present
    weight: 3
    description: Broker recall surfaces at least one relevant item.
    pass_condition: "output_number_gte:metrics.broker_useful_recall_rate:1"
  - name: no_harmful_results
    weight: 2
    description: The top-k broker slice contains no harmful recall.
    pass_condition: "output_number_lte:metrics.broker_harmful_recall_rate:0"
  - name: no_contradictions
    weight: 2
    description: The broker slice contains no contradictory recall.
    pass_condition: "output_number_lte:metrics.broker_contradiction_rate:0"
