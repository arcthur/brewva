name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Static Checks (Format, Lint, Typecheck)
        run: bun run check

      - name: Run Unit Tests
        run: bun run test:unit

      - name: Run Contract Tests
        run: bun run test:contract

      - name: Run System Tests
        run: bun run test:system

      - name: Run Repository Fitness Tests
        run: bun run test:fitness

      - name: Run Dist Smoke Checks
        run: bun run test:dist

  binaries-promoted:
    name: Build ${{ matrix.label }} Binary
    runs-on: ${{ matrix.runner }}
    needs: quality
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-latest
            target: brewva-linux-x64
            smoke: ./distribution/brewva-linux-x64/bin/brewva --help | head -n 1
          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            target: brewva-linux-arm64
            smoke: ./distribution/brewva-linux-arm64/bin/brewva --help | head -n 1
          - label: macOS ARM64
            runner: macos-14
            target: brewva-darwin-arm64
            smoke: ./distribution/brewva-darwin-arm64/bin/brewva --help | head -n 1
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.label }} Binary
        shell: bash
        run: BREWVA_BINARY_TARGETS=${{ matrix.target }} bun run build:binaries

      - name: ${{ matrix.label }} Binary Smoke Test
        shell: bash
        # Default GHA bash uses pipefail; `program --help | head -n 1` makes `head` close the
        # pipe early and `brewva` exits 141 (SIGPIPE), failing the step.
        run: |
          set +o pipefail
          ${{ matrix.smoke }}
