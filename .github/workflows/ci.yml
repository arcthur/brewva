name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Static Checks (Format, Lint, Typecheck)
        run: bun run check

      - name: Run Unit Tests
        run: bun run test:unit

      - name: Run Contract Tests
        run: bun run test:contract

      - name: Run System Tests
        run: bun run test:system

      - name: Run Quality Layer Tests
        run: bun run test:quality

      - name: Run Dist Smoke Checks
        run: bun run test:dist

  binaries-promoted:
    name: Build ${{ matrix.label }} Binary
    runs-on: ${{ matrix.runner }}
    needs: quality
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-latest
            target: brewva-linux-x64
            smoke: ./distribution/brewva-linux-x64/bin/brewva --help | head -n 1
          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            target: brewva-linux-arm64
            smoke: ./distribution/brewva-linux-arm64/bin/brewva --help | head -n 1
          - label: macOS ARM64
            runner: macos-14
            target: brewva-darwin-arm64
            smoke: ./distribution/brewva-darwin-arm64/bin/brewva --help | head -n 1
          - label: macOS x64
            runner: macos-15-intel
            target: brewva-darwin-x64
            smoke: ./distribution/brewva-darwin-x64/bin/brewva --help | head -n 1
          - label: Windows x64
            runner: windows-latest
            target: brewva-windows-x64
            smoke: ./distribution/brewva-windows-x64/bin/brewva.exe --help | head -n 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.label }} Binary
        shell: bash
        run: BREWVA_BINARY_TARGETS=${{ matrix.target }} BREWVA_SHELL_SMOKE=1 bun run build:binaries

      - name: ${{ matrix.label }} Binary Smoke Test
        shell: bash
        run: ${{ matrix.smoke }}
