producer: debugging
outputs:
  - root_cause
  - fix_strategy
  - failure_evidence
  - investigation_record
  - planning_posture
output_contracts:
  root_cause:
    kind: text
    min_words: 3
    min_length: 18
  fix_strategy:
    kind: text
    min_words: 3
    min_length: 18
  failure_evidence:
    kind: text
    min_words: 2
    min_length: 12
  investigation_record:
    kind: json
    min_keys: 5
  planning_posture:
    kind: enum
    values:
      - trivial
      - moderate
      - complex
      - high_risk
