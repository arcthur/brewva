producer: office-hours
outputs:
  - office_hours_brief
  - mode_decision
  - premise_challenge
  - approach_options
  - next_assignment
output_contracts:
  office_hours_brief:
    kind: text
    min_words: 8
    min_length: 48
  mode_decision:
    kind: enum
    values:
      - startup
      - builder
  premise_challenge:
    kind: json
    min_items: 1
  approach_options:
    kind: json
    min_items: 2
  next_assignment:
    kind: json
    required_fields:
      - type
      - assignment
      - evidence_target
    field_contracts:
      type:
        kind: enum
        values:
          - evidence_gathering
          - selection
          - framing
      assignment:
        kind: text
        min_words: 5
        min_length: 32
      evidence_target:
        kind: text
        min_words: 4
        min_length: 24
