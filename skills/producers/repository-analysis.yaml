producer: repository-analysis
outputs:
  - repository_snapshot
  - impact_map
  - planning_posture
  - unknowns
output_contracts:
  repository_snapshot:
    kind: text
    min_words: 3
    min_length: 18
  impact_map:
    kind: json
    min_keys: 6
    required_fields:
      - summary
      - affected_paths
      - boundaries
      - high_risk_touchpoints
      - change_categories
      - changed_file_classes
    field_contracts:
      summary:
        kind: text
        min_words: 3
        min_length: 18
      affected_paths:
        kind: json
        min_items: 1
      boundaries:
        kind: json
        min_items: 0
      high_risk_touchpoints:
        kind: json
        min_items: 0
      change_categories:
        kind: json
        min_items: 0
      changed_file_classes:
        kind: json
        min_items: 1
  planning_posture:
    kind: enum
    values:
      - trivial
      - moderate
      - complex
      - high_risk
  unknowns:
    kind: json
    min_items: 1
