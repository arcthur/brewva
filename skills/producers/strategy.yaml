producer: strategy
outputs:
  - strategy_review
  - scope_decision
  - planning_posture
  - strategic_risks
output_contracts:
  strategy_review:
    kind: text
    min_words: 3
    min_length: 18
  scope_decision:
    kind: text
    min_words: 3
    min_length: 18
  planning_posture:
    kind: enum
    values:
      - trivial
      - moderate
      - complex
      - high_risk
  strategic_risks:
    kind: json
    min_items: 1
