producer: learning-research
outputs:
  - knowledge_brief
  - precedent_refs
  - preventive_checks
  - precedent_query_summary
  - precedent_consult_status
output_contracts:
  knowledge_brief:
    kind: text
    min_words: 3
    min_length: 18
  precedent_refs:
    kind: json
  preventive_checks:
    kind: json
  precedent_query_summary:
    kind: text
    min_words: 3
    min_length: 18
  precedent_consult_status:
    kind: enum
    values:
      - matched
      - no_relevant_precedent_found
